<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>拳皇风格格斗游戏</title>
    <style>
html, body, #canvas {
    margin: 0;
    padding: 0;
    border: 0;
}
body {
    color: white;
    background-color: black;
    overflow: hidden;
    touch-action: none;
}
#canvas {
    display: block;
}
#canvas:focus {
    outline: none;
}
#status, #status-splash, #status-progress {
    position: absolute;
    left: 0;
    right: 0;
}
#status, #status-splash {
    top: 0;
    bottom: 0;
}
#status {
    background-color: #242424;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    visibility: hidden;
}
#status-splash {
    max-height: 100%;
    max-width: 100%;
    margin: auto;
}
#status-progress, #status-notice {
    display: none;
}
#status-progress {
    bottom: 10%;
    width: 50%;
    margin: 0 auto;
}
#status-notice {
    background-color: #5b3943;
    border-radius: 0.5rem;
    border: 1px solid #9b3943;
    color: #e0e0e0;
    font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
    line-height: 1.3;
    margin: 0 2rem;
    overflow: hidden;
    padding: 1rem;
    text-align: center;
    z-index: 1;
}
#loading-text {
    position: absolute;
    bottom: 15%;
    width: 100%;
    text-align: center;
    color: #fff;
    font-family: Arial, sans-serif;
    font-size: 16px;
}
    </style>
    <link id="-gd-engine-icon" rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/juanrui0932/fighting-game@main/index.icon.png" />
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/juanrui0932/fighting-game@main/index.apple-touch-icon.png"/>
</head>
<body>
    <canvas id="canvas">
        Your browser does not support the canvas tag.
    </canvas>
    <noscript>
        Your browser does not support JavaScript.
    </noscript>
    <div id="status">
        <img id="status-splash" src="https://cdn.jsdelivr.net/gh/juanrui0932/fighting-game@main/index.png" alt="">
        <progress id="status-progress"></progress>
        <div id="status-notice"></div>
    </div>
    <div id="loading-text">正在加载游戏资源，请稍候...</div>
    <script src="https://cdn.jsdelivr.net/gh/juanrui0932/fighting-game@main/index.js"></script>
    <script>
const GODOT_CONFIG = {
    "args": [],
    "canvasResizePolicy": 2,
    "ensureCrossOriginIsolationHeaders": true,
    "executable": "index",
    "experimentalVK": false,
    "fileSizes": {
        "index.pck": 82812944,
        "index.wasm": 35376909
    },
    "focusCanvas": true,
    "gdextensionLibs": []
};
const GODOT_CONFIG_CDN = {
    ...GODOT_CONFIG,
    "executable": "https://cdn.jsdelivr.net/gh/juanrui0932/fighting-game@main/index"
};
const engine = new Engine(GODOT_CONFIG_CDN);
(function() {
    const INDETERMINATE_STATUS_STEP_MS = 100;
    var statusProgress = document.getElementById('status-progress');
    var statusNotice = document.getElementById('status-notice');
    var initializing = true;
    var statusMode = 'hidden';
    var animationCallbacks = [];
    (function(mode) {
        statusProgress.value = 0;
        statusProgress.style.display = 'block';
        document.getElementById('loading-text').style.display = 'block';
        statusMode = mode;
    })('indeterminate');
    function displayFailureNotice(err) {
        var msg = err.message || err;
        console.error(msg);
        statusNotice.innerHTML = msg;
        statusNotice.style.display = 'block';
        document.getElementById('loading-text').style.display = 'none';
    };
    const game = document.getElementById('canvas');
    engine.setCanvas(game);
    engine.startGame({
        'onProgress': function(current, total) {
            if (current > 0 && total > 0) {
                statusProgress.value = current / total;
                if (current === total) {
                    document.getElementById('loading-text').textContent = '加载完成，启动中...';
                }
            }
        }
    }).then(function() {
        document.getElementById('loading-text').style.display = 'none';
    }, function(err) {
        displayFailureNotice(err);
    });
})();
    </script>
</body>
</html>
