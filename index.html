<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>格斗对决 - 凯总 vs 亮子</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
#container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
#canvas { display: block; max-width: 100%; max-height: 100%; }
#rotate-prompt {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(180deg, #1a1a2e, #16213e);
    color: #fff; font-family: Arial; text-align: center;
    justify-content: center; align-items: center; flex-direction: column; z-index: 9999;
}
.icon { font-size: 80px; margin-bottom: 20px; animation: rotate 1s infinite; }
@keyframes rotate { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } }
#skip-btn { margin-top: 30px; padding: 15px 40px; font-size: 18px; background: #e94560; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
#status { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #1a1a2e; display: flex; flex-direction: column; justify-content: center; align-items: center; visibility: hidden; }
#status-progress { width: 60%; height: 20px; margin-top: 20px; }
#loading-text { color: #fff; font-family: Arial; font-size: 18px; margin-top: 15px; }
</style>
</head>
<body>
<div id="rotate-prompt">
    <div class="icon">📱</div>
    <div style="font-size:24px">请旋转至横屏模式</div>
    <button id="skip-btn" onclick="skipRotate()">跳过，直接开始</button>
</div>
<div id="container"><canvas id="canvas"></canvas></div>
<div id="status">
    <progress id="status-progress"></progress>
    <div id="loading-text">正在加载游戏...</div>
</div>
<script src="index.js"></script>
<script>
var forceShow = false;
function checkOrientation() {
    var isLandscape = window.innerWidth > window.innerHeight;
    if (!forceShow && !isLandscape && window.innerWidth < 800) {
        document.getElementById('rotate-prompt').style.display = 'flex';
        document.getElementById('container').style.display = 'none';
    } else {
        document.getElementById('rotate-prompt').style.display = 'none';
        document.getElementById('container').style.display = 'flex';
        forceShow = true;
    }
}
function skipRotate() { forceShow = true; checkOrientation(); }
window.addEventListener('resize', checkOrientation);
checkOrientation();
const engine = new Engine({"args":[],"canvasResizePolicy":2,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"focusCanvas":true,"gdextensionLibs":[]});
document.getElementById('status').style.visibility = 'visible';
engine.startGame({'onProgress': function(c, t) {
    document.getElementById('status-progress').value = c / t;
    document.getElementById('loading-text').textContent = '加载中... ' + Math.round(c/t*100) + '%';
}}).then(function() { document.getElementById('status').style.visibility = 'hidden'; });
</script>
</body>
</html>
